name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@aec4adc1a817c56790d1698329ef9398a15a754a  # v2026.5
    with:
      ignore-scripts: true
      # better-sqlite3 v13 ships prebuilt bindings under `prebuilds/<platform>-<arch>.node`
      # and loads them at require time — no install script, no runtime rebuild.
      # Nothing extra is needed under --ignore-scripts.
      test-command: "bun run test:coverage"
      typecheck-command: "bun run typecheck"
      lint-command: "bun run lint"
      osv-config: "osv-scanner.toml"
      enable-security: "true"
      enable-l2: "true"
      l2-command: "bun run test:l2"
    secrets: inherit
