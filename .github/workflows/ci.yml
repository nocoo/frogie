name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.3
    with:
      ignore-scripts: true
      trusted-native-deps: "better-sqlite3"
      test-command: "bun run test:coverage"
      typecheck-command: "bun run typecheck"
      lint-command: "bun run lint"
      osv-config: "osv-scanner.toml"
      enable-security: "true"
      enable-l2: "true"
      l2-command: "bun run test:l2"
    secrets: inherit
