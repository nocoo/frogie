name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.1
    with:
      test-command: "bun run test:coverage"
      typecheck-command: "bun run typecheck"
      lint-command: "bun run lint"
      osv-config: "osv-scanner.toml"
      enable-l2: "false"
    secrets: inherit
